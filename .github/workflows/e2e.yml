name: End-to-end tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify_files:
    name: Verify Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'
      - name: Install latest npm (>= 11.5.1)
        shell: bash
        run: |
          REQUIRED=11.5.1
          if [ "$(printf '%s\n' "$REQUIRED" "$(npm -v)" | sort -V | head -n1)" = "$REQUIRED" ]; then
            echo "npm $(npm -v) is up-to-date (>= $REQUIRED)"
            exit 0
          fi
          # Use a user-writable prefix so this works in PRs from forks where
          # the default global prefix may be read-only. Prepend its bin dir to
          # PATH via $GITHUB_PATH so subsequent steps pick up the new npm.
          NPM_PREFIX="$RUNNER_TEMP/npm-global"
          mkdir -p "$NPM_PREFIX"
          npm install --prefix "$NPM_PREFIX" -g "npm@$REQUIRED"
          echo "$NPM_PREFIX/bin" >> "$GITHUB_PATH"
          "$NPM_PREFIX/bin/npm" -v
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Install test dependencies
        working-directory: ./e2e
        run: npm ci
      - name: Install Playwright browsers
        working-directory: ./e2e
        run: npx playwright install --with-deps
      - name: Run e2e tests
        working-directory: ./e2e
        run: npm run test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
      - name: Publish Test Report
        if: ${{ !cancelled() }}
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: './e2e/ctrf/*.json'
          summary-report: true
          failed-report: true
          pull-request: true
        env:
          GITHUB_TOKEN: ${{ secrets.YC_UI_BOT_GITHUB_TOKEN }}
