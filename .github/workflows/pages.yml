name: Deploy Playground to GitHub Pages

# This workflow deploys the playground to GitHub Pages when a release is published
# The playground is an interactive YFM syntax testing tool

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Install latest npm (>= 11.5.1)
        shell: bash
        run: |
          REQUIRED=11.5.1
          if [ "$(printf '%s\n' "$REQUIRED" "$(npm -v)" | sort -V | head -n1)" = "$REQUIRED" ]; then
            echo "npm $(npm -v) is up-to-date (>= $REQUIRED)"
            exit 0
          fi
          # Use a user-writable prefix so this works in PRs from forks where
          # the default global prefix may be read-only. Prepend its bin dir to
          # PATH via $GITHUB_PATH so subsequent steps pick up the new npm.
          NPM_PREFIX="$RUNNER_TEMP/npm-global"
          mkdir -p "$NPM_PREFIX"
          npm install --prefix "$NPM_PREFIX" -g "npm@$REQUIRED"
          echo "$NPM_PREFIX/bin" >> "$GITHUB_PATH"
          "$NPM_PREFIX/bin/npm" -v

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Install playground dependencies
        working-directory: playground
        run: npm ci

      - name: Build playground artifacts
        working-directory: playground
        run: npm run pages

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './playground/build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
